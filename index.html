<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      // Detecta si estamos en una subcarpeta para ajustar la ruta al sw.js en la raíz
      const isSubfolder = window.location.pathname.includes('/ilum/') || 
                          window.location.pathname.includes('/atenua/');
      const swPath = isSubfolder ? '../sw.js' : './sw.js';
      
      navigator.serviceWorker.register(swPath)
        .then(reg => console.log('VispApp: SW registrado con éxito desde ' + swPath))
        .catch(err => console.error('VispApp: Error al registrar SW', err));
    });
  }
</script>
